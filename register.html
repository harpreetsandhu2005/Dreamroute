<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | My Project</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>Create Account</h2>
            <p>Please enter your details to register.</p>
        </div>

       <form action="database/usignup.php" method="POST" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required minlength="3" maxlength="30" pattern="[A-Za-z ]+" title="Username must contain only letters">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required pattern="[^\s@]+@[^\s@]+\.[^\s@]+" title="Enter a valid email address">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password (min 6 chars, 1 uppercase)" required minlength="6" pattern="(?=.*[A-Z]).{6,}" title="Password must be at least 6 characters and contain one uppercase letter">
            </div>

            <button type="submit" class="login-btn">create </button>
            
            <p class="signup-text">have an account? <a href="login.html">Sign in</a></p>
            <br>
            <a href="index.html" class="back"> back to home </a>
        </form>
    </div>

<script src="validation.js"></script>
</body>
</html>
